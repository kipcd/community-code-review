name: Deploy OCR to Repositories

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: |
          Repository to target (leave empty for all repos in the org).
          If not provided, the action will replicate to all accessible repositories.
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replicate OCR workflow to other repositories
        if: ${{ github.event.inputs.repo_name != github.event.repository.name }}
        uses: derberg/manage-files-in-multiple-repositories@v2
        with:
          github_token: ${{ secrets.PAT_WITH_REPO_SCOPE }}
          patterns_to_include: workflows/ocr-review.yml
          destination: .github/workflows
          patterns_to_ignore: .github/workflows/deploy-ocr.yml,.github/workflows/build-volunteer.yml
          commit_message: "Add automated code review workflow"
          committer_username: web-flow
          committer_email: noreply@github.com

      - name: Self-deploy OCR workflow to current repository
        if: ${{ github.event.inputs.repo_name == github.event.repository.name }}
        env:
          GH_TOKEN: ${{ secrets.PAT_WITH_REPO_SCOPE }}
          PAT: ${{ secrets.PAT_WITH_REPO_SCOPE }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "web-flow"
          git config user.email "noreply@github.com"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${REPO}.git"
          BRANCH="bot/add-ocr-workflow-$(date +%s)"
          git checkout -b "$BRANCH"
          mkdir -p .github/workflows
          cp workflows/ocr-review.yml .github/workflows/ocr-review.yml
          git add .github/workflows/ocr-review.yml
          git commit -m "Add automated code review workflow"
          git push origin "$BRANCH"
          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "Add automated code review workflow" \
            --body "This PR adds the automated OCR code review workflow to this repository."