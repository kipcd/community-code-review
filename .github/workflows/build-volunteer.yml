name: Build and Publish Volunteer Image

on:
  push:
    branches: [main]
    paths:
      - "volunteer/**"
      - "!volunteer/**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    strategy:
      matrix:
        backend: [cuda, rocm, vulkan, intel]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push volunteer image (${{ matrix.backend }})
        uses: docker/build-push-action@v6
        with:
          context: volunteer
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/volunteer:${{ matrix.backend }}
          build-args: |
            ORG_NAME=${{ github.repository_owner }}
            BACKEND=${{ matrix.backend }}

      # Tag the CUDA build as "latest" too (most common backend)
      - name: Tag cuda as latest
        if: matrix.backend == 'cuda'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/volunteer:cuda \
                 ghcr.io/${{ github.repository_owner }}/volunteer:latest
          docker push ghcr.io/${{ github.repository_owner }}/volunteer:latest