name: Build and Publish Coordinator Image

on:
  push:
    branches: [main]
    paths:
      - "coordinator/**"
      - "!coordinator/**/*.md"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          REPO_OWNER="${REPO_OWNER,,}"
          REPO="ghcr.io/${REPO_OWNER}/coordinator"
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${RELEASE_TAG}"
            echo "tags=${REPO}:latest,${REPO}:${TAG}" >> "$GITHUB_OUTPUT"
          else
            SANITIZED_BRANCH=$(echo "${REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            if [ "${REF_NAME}" = "main" ]; then
              echo "tags=${REPO}:latest,${REPO}:${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
            else
              echo "tags=${REPO}:${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push coordinator image
        uses: docker/build-push-action@v7
        with:
          context: coordinator
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ORG_NAME=${{ github.repository_owner }}
